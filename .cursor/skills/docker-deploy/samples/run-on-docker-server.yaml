# Remote deploy settings — copy to .deploy/docker/ and adapt.
# Scripts read this file only (no CLI -- flags).
# Non-empty override fields replace values from compose_file / dockerfile.
# Fill ssh with a real value before running; leave placeholder until then.

stack_name: myapp
image_tag: myapp:latest
compose_file: ../../docker-compose.yml
dockerfile: ../../dockerfile
docker_network: myapp-net
internal_port: ""
delete_volume: "no"
delete_image: "no"
build_image_on: "local"  # local = build here and upload; server = build on remote

ssh: "ssh <alias>"

volume_dir: "/home/<user>/docker/myapp"
